server:
  port: 8081

#logging:
#  level:
#    org.springframework: DEBUG
#    org.springframework.data: DEBUG
#    org.hibernate: DEBUG
#    eu.isygoit: DEBUG

spring:
  application:
    name: Poc Json-based entity

  datasource:
    url: jdbc:postgresql://localhost:5432/tenants?currentSchema=public
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true                   # Prints SQL statements
    hibernate:
      ddl-auto: create               # Recreate schema each startup
    properties:
      hibernate:
        format_sql: true             # Format SQL for readability
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  tenancy:
    enabled: true
    filter: CONTEXT # TENANT | CONTEXT
    mode: GDM  # DATABASE | SCHEMA | DISCRIMINATOR | GDM
    tenants:
      - id: tenants
        url: jdbc:postgresql://localhost:5432/tenants
        username: postgres
        password: root